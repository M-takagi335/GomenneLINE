<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>LINE風チャット編集アプリ</title>
<style>
  :root{
    --line-green:#06C755;
    --bg:#7494c0;
    --panel:#ffffff;
    --text:#111;
    --muted:#7a7a7a;
    --me:#8DE055;
    --other:#ffffff;
    --border:#d9d9d9;
    --header:#06C755;
    --input:#f7f7f7;
    --date:rgba(0,0,0,.25);
    --shadow:0 12px 35px rgba(0,0,0,.18);
  }
  body.dark{
    --bg:#000;
    --panel:#151515;
    --text:#fff;
    --muted:#aaa;
    --me:#06C755;
    --other:#242424;
    --border:#333;
    --header:#111;
    --input:#1e1e1e;
    --date:rgba(255,255,255,.18);
    --shadow:none;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;color:var(--text);background:#111;}
  body{display:flex;align-items:center;justify-content:center;}
  .app{width:100%;max-width:430px;height:100dvh;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow);position:relative;}
  .header{height:58px;padding:10px 12px;background:var(--header);color:white;display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .back{font-size:28px;line-height:1;font-weight:300;margin-right:-4px;}
  .avatar-wrap{width:38px;height:38px;border-radius:50%;overflow:hidden;background:#ddd;display:grid;place-items:center;flex-shrink:0;border:1px solid rgba(255,255,255,.25)}
  .avatar-wrap img{width:100%;height:100%;object-fit:cover;display:none}
  .avatar-letter{font-weight:700;color:#555;font-size:17px}
  .title{min-width:0;flex:1;}
  .name{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .status{font-size:11px;opacity:.85;margin-top:1px;}
  .icon-btn{border:0;background:transparent;color:white;font-size:23px;padding:5px;line-height:1;border-radius:8px;}
  .chat{flex:1;overflow-y:auto;padding:14px 10px 12px;background:var(--bg);background-size:cover;background-position:center;}
  .date-sep{margin:10px auto 16px;display:table;padding:5px 12px;border-radius:14px;background:var(--date);color:#fff;font-size:12px;}
  .row{display:flex;margin:8px 0;gap:7px;align-items:flex-end;}
  .row.me{justify-content:flex-end;}
  .mini-avatar{width:30px;height:30px;border-radius:50%;overflow:hidden;background:#ddd;display:grid;place-items:center;flex-shrink:0;align-self:flex-start;margin-top:2px;}
  .mini-avatar img{width:100%;height:100%;object-fit:cover;display:none}
  .mini-avatar span{font-size:13px;color:#555;font-weight:700;}
  .bubble{max-width:72%;padding:8px 11px;border-radius:17px;font-size:15.5px;line-height:1.38;white-space:pre-wrap;word-break:break-word;position:relative;box-shadow:0 1px 1px rgba(0,0,0,.06);}
  .other .bubble{background:var(--other);border-top-left-radius:5px;color:var(--text);box-shadow:none;border:none;}
  .me .bubble{background:var(--me);border-top-right-radius:5px;color:#111;}
  body.dark .me .bubble{color:#111;}
  .meta{font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.35);min-width:36px;margin:0 2px 2px;line-height:1.18;}
  body.dark .meta{color:#cfcfcf;text-shadow:none;}
  .me .meta{text-align:right;order:-1;}
  .read{display:block;}
  .bubble[contenteditable="true"]{outline:none;}
  .bubble:focus{outline:none;}
  .other .bubble,.other .bubble:focus{border:none!important;outline:none!important;box-shadow:none!important;}
  .composer{background:var(--panel);border-top:1px solid var(--border);padding:8px 8px calc(8px + env(safe-area-inset-bottom));flex-shrink:0;}
  body.dark .composer{background:#111;}
  .mode-line{display:none;gap:8px;margin-bottom:8px;}
  .mode-line.show{display:flex;}
  .seg{flex:1;border:0;border-radius:16px;background:var(--input);color:var(--text);padding:8px;font-weight:700;}
  .seg.active{background:var(--line-green);color:white;border-color:var(--line-green);}
  .input-line{display:flex;align-items:center;gap:10px;min-height:42px;}
  .tool-btn{width:34px;height:38px;border:0;background:transparent;color:#b8b8b8;display:flex;align-items:center;justify-content:center;flex:0 0 auto;padding:0;}
  .tool-btn svg{width:30px;height:30px;stroke:currentColor;fill:none;stroke-width:2.15;stroke-linecap:round;stroke-linejoin:round;}
  .tool-btn.plus svg{width:32px;height:32px;}
  .tool-btn.chevron svg{width:32px;height:32px;}
  .left-tools{display:flex;align-items:center;gap:12px;flex:0 0 auto;transition:.16s ease;}
  .collapse-btn{display:none;margin-left:-2px;}
  .input-wrap{flex:1;display:flex;align-items:center;background:var(--input);border-radius:22px;min-width:0;padding:0 9px 0 13px;height:40px;}
  textarea{flex:1;resize:none;border:0;outline:0;max-height:96px;min-height:24px;height:24px;background:transparent;color:var(--text);padding:2px 4px 0 0;font-size:16px;line-height:1.25;min-width:0;}
  textarea::placeholder{color:#777;}
  .emoji-btn{width:31px;height:31px;border:0;background:transparent;color:#8b8b8b;display:flex;align-items:center;justify-content:center;flex:0 0 auto;padding:0;}
  .emoji-btn svg{width:30px;height:30px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}
  .send{width:44px;height:40px;border:0;background:transparent;color:#5b70ff;display:flex;align-items:center;justify-content:center;flex:0 0 auto;padding:0;position:relative;z-index:100;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
  .send svg{width:34px;height:34px;fill:currentColor;stroke:none;pointer-events:none;}
  .mic{display:flex;}
  .has-text .left-tools{display:none;}
  .has-text .collapse-btn{display:flex;}
  .has-text .mic{display:none;}
  .has-text .input-line{gap:8px;}
  .has-text .input-wrap{height:40px;}
  body.dark .input-wrap{background:#1f1f1f;}
  .settings{position:absolute;inset:0;background:rgba(0,0,0,.35);display:none;align-items:flex-end;z-index:5;}
  .settings.open{display:flex;}
  .sheet{width:100%;background:var(--panel);color:var(--text);border-radius:22px 22px 0 0;padding:18px 16px calc(20px + env(safe-area-inset-bottom));max-height:82dvh;overflow:auto;}
  .sheet h2{margin:0 0 14px;font-size:18px;}
  label{display:block;font-size:13px;color:var(--muted);margin:14px 0 6px;}
  input[type="text"], input[type="color"]{width:100%;height:42px;border:1px solid var(--border);border-radius:12px;background:var(--input);color:var(--text);padding:0 12px;font-size:15px;}
  input[type="file"]{width:100%;font-size:14px;color:var(--text);}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid var(--border);border-radius:14px;padding:12px;margin-top:12px;background:var(--input);}
  .toggle-row span{font-size:14px;}
  .actions{display:flex;gap:8px;margin-top:16px;}
  .actions button{flex:1;border:0;border-radius:13px;padding:12px;font-weight:700;font-size:15px;}
  .primary{background:var(--line-green);color:white;}
  .secondary{background:var(--input);color:var(--text);border:1px solid var(--border)!important;}
  .danger{background:#ff4d4f;color:white;}
  .hint{font-size:12px;color:var(--muted);line-height:1.5;margin-top:10px;}


  .hidden-settings-toggle{width:100%;border:1px solid var(--border);border-radius:14px;background:var(--input);color:var(--text);padding:12px;margin-top:12px;font-weight:700;font-size:14px;text-align:left;}
  .auto-reply-box{display:none;margin-top:10px;border:1px solid var(--border);border-radius:16px;background:var(--input);padding:12px;}
  .auto-reply-box.show{display:block;}
  .auto-reply-box textarea{width:100%;height:96px;min-height:96px;max-height:160px;border:1px solid var(--border);border-radius:12px;background:var(--panel);color:var(--text);padding:10px;font-size:15px;line-height:1.45;resize:vertical;}
  .number-row{display:flex;gap:10px;}
  .number-row > div{flex:1;}
  input[type="number"]{width:100%;height:42px;border:1px solid var(--border);border-radius:12px;background:var(--panel);color:var(--text);padding:0 12px;font-size:15px;}

  .edit-panel{position:fixed;left:12px;right:12px;bottom:calc(78px + env(safe-area-inset-bottom));z-index:20;background:rgba(35,35,35,.96);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:12px;box-shadow:0 14px 40px rgba(0,0,0,.35);display:none;gap:8px;align-items:center;}
  .edit-panel.show{display:flex;}
  .edit-panel input{flex:1;min-width:0;border:0;outline:0;border-radius:12px;background:#1b1b1b;color:#fff;padding:10px;font-size:16px;}
  .edit-panel button{border:0;border-radius:12px;padding:10px 12px;font-weight:700;background:#333;color:#fff;}
  .edit-panel .danger{background:#b52b2b;}
  .edit-panel .ok{background:var(--line-green);color:#000;}

  .row.dragging{opacity:.96;position:fixed;z-index:60;left:0;right:auto;pointer-events:none;box-shadow:0 12px 28px rgba(0,0,0,.28);transform:scale(1.02);}
  .drag-placeholder{height:44px;margin:8px 0;border-radius:16px;background:rgba(255,255,255,.18);border:1px dashed rgba(255,255,255,.45);}
  .row.drag-ready .bubble{filter:brightness(1.08);}

</style>
</head>
<body class="dark">
  <main class="app">
    <header class="header">
      <div class="back">‹</div>
      <div class="title"><div class="name" id="displayName">相手の名前</div></div>
      <button class="icon-btn" id="settingsBtn" title="設定">⚙︎</button>
    </header>

    <section class="chat" id="chat"></section>

    <section class="composer">
      <div class="mode-line" id="modeLine">
        <button class="seg" id="asOther">相手として送信</button>
        <button class="seg active" id="asMe">自分として送信</button>
      </div>
      <div class="input-line" id="inputLine">
        <div class="left-tools" id="leftTools">
          <button class="tool-btn plus" id="modeToggle" title="送信者を選ぶ" type="button">
            <svg viewBox="0 0 24 24"><path d="M12 4v16"/><path d="M4 12h16"/></svg>
          </button>
          <button class="tool-btn small" title="カメラ" type="button">
            <svg viewBox="0 0 24 24"><path d="M7 7.5l1.4-2h7.2l1.4 2H20a2 2 0 0 1 2 2V18a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9.5a2 2 0 0 1 2-2h3z"/><circle cx="12" cy="13.5" r="4"/></svg>
          </button>
          <button class="tool-btn small" title="画像" type="button">
            <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M7 16l4-4 3 3 2-2 4 4"/><circle cx="8" cy="9" r="1.2"/></svg>
          </button>
        </div>
        <button class="tool-btn collapse-btn chevron" id="expandTools" title="メニュー" type="button">
          <svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
        </button>
        <div class="input-wrap">
          <textarea id="msg" rows="1" placeholder="Aa"></textarea>
          <button class="emoji-btn" title="スタンプ" type="button">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="9"/>
              <path d="M8.4 10h.1"/>
              <path d="M15.5 10h.1"/>
              <path d="M8.5 14.2c1.2 1.5 5.8 1.5 7 0"/>
            </svg>
          </button>
        </div>
        <button class="send" id="send" title="送信" type="button" aria-label="送信">
          <svg viewBox="0 0 24 24">
            <path d="M3.2 4.3c-.5-.25-1 .24-.78.76l3.1 7.1c.08.18.08.38 0 .56l-3.1 7.1c-.22.52.28 1.01.78.76l18.1-8.54c.52-.25.52-.99 0-1.24L3.2 4.3z"/>
          </svg>
        </button>
        <button class="tool-btn small mic" title="マイク" type="button">
          <svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v3"/><path d="M8 21h8"/></svg>
        </button>
      </div>
    </section>

    <div class="settings" id="settings">
      <div class="sheet">
        <h2>トーク設定</h2>
        <label>相手の名前</label>
        <input type="text" id="nameInput" value="相手の名前">
        <label>相手のアイコン画像</label>
        <input type="file" id="avatarInput" accept="image/*">
        <label>背景色</label>
        <input type="color" id="bgColor" value="#7494c0">
        <div class="toggle-row"><span>ダークモード</span><input type="checkbox" id="darkMode" checked></div>

        <button class="hidden-settings-toggle" id="autoReplyToggle" type="button">自動返信設定を開く</button>
        <div class="auto-reply-box" id="autoReplyBox">
          <div class="toggle-row"><span>ランダム自動返信</span><input type="checkbox" id="autoReplyEnabled"></div>
          <label>返信する言葉（1行に1つ）</label>
          <textarea id="replyWords" placeholder="ありがとう
ごめん
了解"></textarea>
          <div class="number-row">
            <div>
              <label>最低回数</label>
              <input type="number" id="replyMin" min="1" value="1">
            </div>
            <div>
              <label>上限回数</label>
              <input type="number" id="replyMax" min="1" value="3">
            </div>
          </div>
          <div class="hint">自分側で送信した回数がこの範囲内のランダム回数に達すると、相手から登録した言葉の中からランダムで返信されます。</div>
        </div>
        <div class="hint">吹き出しをタップすると、時間変更や削除ができます。文字はそのまま編集できます。左の＋/＞を押すと送信者を切り替えられます。</div>
        <div class="actions">
          <button class="secondary" id="closeSettings">閉じる</button>
          <button class="danger" id="clearChat">全削除</button>
        </div>
      </div>
    </div>
  
<div class="edit-panel" id="editPanel">
  <input type="time" id="editTime">
  <button class="ok" id="saveTime">保存</button>
  <button class="danger" id="deleteMsg">削除</button>
  <button id="closeEdit">閉じる</button>
</div>

  </main>

<script>
(() => {
  const chat = document.getElementById('chat');
  const msg = document.getElementById('msg');
  const send = document.getElementById('send');
  const settings = document.getElementById('settings');
  const displayName = document.getElementById('displayName');
  const nameInput = document.getElementById('nameInput');
  const avatarInput = document.getElementById('avatarInput');
  const bgColor = document.getElementById('bgColor');
  const darkMode = document.getElementById('darkMode');
  const autoReplyToggle = document.getElementById('autoReplyToggle');
  const autoReplyBox = document.getElementById('autoReplyBox');
  const autoReplyEnabled = document.getElementById('autoReplyEnabled');
  const replyWords = document.getElementById('replyWords');
  const replyMin = document.getElementById('replyMin');
  const replyMax = document.getElementById('replyMax');
  const modeLine = document.getElementById('modeLine');
  const inputLine = document.getElementById('inputLine');
  const expandTools = document.getElementById('expandTools');
  const editPanel = document.getElementById('editPanel');
  const editTime = document.getElementById('editTime');
  const asOther = document.getElementById('asOther');
  const asMe = document.getElementById('asMe');

  const SETTINGS_KEY = 'lineChatAppV2';
  const CHAT_KEY = 'lineChatMessagesV2';
  const AVATAR_KEY = 'lineAvatar';

  let editingMessage = null;
  let dragTimer = null;
  let dragState = null;
  let suppressNextClick = false;
  let sender = 'me';
  let lastDateKey = '';
  let avatarData = localStorage.getItem(AVATAR_KEY) || '';
  let mySendCount = Number(localStorage.getItem('lineChatMySendCount') || 0);
  let nextReplyAt = Number(localStorage.getItem('lineChatNextReplyAt') || 0);

  // 送信者は毎回「自分」から始める
  localStorage.removeItem('lineChatSender');
  localStorage.removeItem('sender');
  try {
    const oldV1 = JSON.parse(localStorage.getItem('lineChatApp') || '{}');
    if(oldV1.sender){ delete oldV1.sender; localStorage.setItem('lineChatApp', JSON.stringify(oldV1)); }
  } catch(e) {}

  const saved = safeJson(localStorage.getItem(SETTINGS_KEY), {});
  if(saved.sender){ delete saved.sender; localStorage.setItem(SETTINGS_KEY, JSON.stringify(saved)); }
  if(saved.name){ nameInput.value = saved.name; displayName.textContent = saved.name; }
  if(saved.dark === false){ document.body.classList.remove('dark'); darkMode.checked = false; } else { document.body.classList.add('dark'); darkMode.checked = true; }
  if(saved.bg){ document.documentElement.style.setProperty('--bg', saved.bg); bgColor.value = saved.bg; }
  autoReplyEnabled.checked = !!saved.autoReplyEnabled;
  replyWords.value = saved.replyWords || '';
  replyMin.value = saved.replyMin || 1;
  replyMax.value = saved.replyMax || 3;
  if(avatarData){ setAvatar(avatarData); }
  if(!nextReplyAt) resetNextReply();

  function safeJson(text, fallback){
    try { return JSON.parse(text || ''); } catch(e) { return fallback; }
  }

  function saveSettings(){
    localStorage.setItem(SETTINGS_KEY, JSON.stringify({
      name:nameInput.value,
      dark:darkMode.checked,
      bg:bgColor.value,
      autoReplyEnabled:autoReplyEnabled.checked,
      replyWords:replyWords.value,
      replyMin:replyMin.value,
      replyMax:replyMax.value
    }));
  }

  function getMessagesFromDom(){
    return [...chat.querySelectorAll('.row')].map(row => ({
      text: row.querySelector('.bubble')?.textContent || '',
      who: row.dataset.who === 'other' ? 'other' : 'me',
      time: row.dataset.time || '',
      dateKey: row.dataset.dateKey || dateKey(new Date())
    }));
  }

  function saveChat(){
    localStorage.setItem(CHAT_KEY, JSON.stringify(getMessagesFromDom()));
  }

  function loadChat(){
    const messages = safeJson(localStorage.getItem(CHAT_KEY), null);
    chat.innerHTML = '';
    lastDateKey = '';
    if(Array.isArray(messages) && messages.length){
      messages.forEach(m => addMessage(m.text || '', m.who || 'me', dateFromStored(m.dateKey, m.time), false, m.time, m.dateKey));
    }else{
      addMessage('こんにちは！ここをタップすると編集できます。', 'other', new Date(), false);
      addMessage('自分のメッセージは即既読になります。', 'me', new Date(), false);
      saveChat();
    }
    chat.scrollTop = chat.scrollHeight;
  }

  function dateFromStored(storedDateKey, storedTime){
    const now = new Date();
    const dk = /^\d{4}-\d{2}-\d{2}$/.test(storedDateKey || '') ? storedDateKey : dateKey(now);
    const tm = /^\d{2}:\d{2}$/.test(storedTime || '') ? storedTime : timeLabel(now);
    const [y,m,d] = dk.split('-').map(Number);
    const [hh,mm] = tm.split(':').map(Number);
    return new Date(y, m - 1, d, hh, mm);
  }

  function setSender(who){
    sender = who === 'other' ? 'other' : 'me';
    asMe.classList.toggle('active', sender === 'me');
    asOther.classList.toggle('active', sender === 'other');
  }

  function replyList(){
    return replyWords.value.split(/\n+/).map(v => v.trim()).filter(Boolean);
  }
  function randomInt(min, max){
    min = Math.max(1, Number(min) || 1);
    max = Math.max(min, Number(max) || min);
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }
  function resetNextReply(){
    nextReplyAt = randomInt(replyMin.value, replyMax.value);
    mySendCount = 0;
    localStorage.setItem('lineChatNextReplyAt', String(nextReplyAt));
    localStorage.setItem('lineChatMySendCount', String(mySendCount));
  }
  function maybeAutoReply(who){
    if(who !== 'me' || !autoReplyEnabled.checked) return;
    const words = replyList();
    if(words.length === 0) return;
    if(!nextReplyAt) resetNextReply();
    mySendCount++;
    localStorage.setItem('lineChatMySendCount', String(mySendCount));
    if(mySendCount >= nextReplyAt){
      const word = words[Math.floor(Math.random() * words.length)];
      setTimeout(() => addMessage(word, 'other', new Date(), true), 350);
      resetNextReply();
    }
  }
  function pad(n){return String(n).padStart(2,'0')}
  function dateKey(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
  function dateLabelFromKey(key){
    const [y,m,d] = key.split('-').map(Number);
    return `${y}年${m}月${d}日`;
  }
  function timeLabel(d){return `${pad(d.getHours())}:${pad(d.getMinutes())}`}
  function maybeDate(d, forcedKey){
    const key = forcedKey || dateKey(d);
    if(key !== lastDateKey){
      const sep = document.createElement('div');
      sep.className = 'date-sep';
      sep.textContent = dateLabelFromKey(key);
      chat.appendChild(sep);
      lastDateKey = key;
    }
  }
  function rebuildDateSeparators(){
    const messages = getMessagesFromDom();
    chat.innerHTML = '';
    lastDateKey = '';
    messages.forEach(m => addMessage(m.text, m.who, dateFromStored(m.dateKey, m.time), false, m.time, m.dateKey));
  }
  function setAvatar(data){
    document.querySelectorAll('.mini-avatar img').forEach(img => { img.src = data; img.style.display = 'block'; });
    document.querySelectorAll('.mini-avatar span').forEach(s => s.style.display = 'none');
  }
  function addMessage(text, who='other', date=new Date(), shouldSave=true, forcedTime='', forcedDateKey=''){
    const messageDateKey = forcedDateKey || dateKey(date);
    const messageTime = forcedTime || timeLabel(date);
    maybeDate(date, messageDateKey);
    const row = document.createElement('div');
    row.className = `row ${who}`;
    row.dataset.who = who;
    row.dataset.time = messageTime;
    row.dataset.dateKey = messageDateKey;
    if(who === 'other'){
      const av = document.createElement('div');
      av.className = 'mini-avatar';
      av.innerHTML = `<img alt=""><span>${(nameInput.value || '相')[0]}</span>`;
      if(avatarData){ av.querySelector('img').src = avatarData; av.querySelector('img').style.display='block'; av.querySelector('span').style.display='none'; }
      row.appendChild(av);
    }
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.contentEditable = 'true';
    bubble.textContent = text;
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.innerHTML = who === 'me' ? `<span class="read">既読</span>${messageTime}` : messageTime;
    row.appendChild(bubble);
    row.appendChild(meta);
    bubble.addEventListener('click', (e) => {
      e.stopPropagation();
      if(suppressNextClick){ suppressNextClick = false; return; }
      openEditPanel(row);
    });
    bubble.addEventListener('focus', () => { if(!dragState) openEditPanel(row); });
    bubble.addEventListener('input', saveChat);
    bubble.addEventListener('blur', saveChat);
    enableLongPressDrag(row);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
    if(shouldSave) saveChat();
  }
  function updateComposerState(){
    inputLine.classList.toggle('has-text', msg.value.trim().length > 0);
  }
  function sendMsg(){
    const text = msg.value.trim();
    if(!text) return;
    const who = (sender === 'other') ? 'other' : 'me';
    addMessage(text, who, new Date(), true);
    maybeAutoReply(who);
    msg.value = '';
    msg.style.height = '24px';
    modeLine.classList.remove('show');
    setSender('me');
    updateComposerState();
  }

  function enableLongPressDrag(row){
    row.addEventListener('pointerdown', (e) => {
      if(e.button !== undefined && e.button !== 0) return;
      if(e.target.closest('.edit-panel') || e.target.closest('button')) return;
      const bubble = e.target.closest('.bubble');
      if(!bubble) return;
      dragTimer = setTimeout(() => startDrag(row, e), 480);
    });
    row.addEventListener('pointerup', clearDragTimer);
    row.addEventListener('pointercancel', clearDragTimer);
    row.addEventListener('pointerleave', clearDragTimer);
    row.addEventListener('pointermove', (e) => {
      if(!dragTimer || dragState) return;
      if(Math.abs(e.movementX || 0) > 7 || Math.abs(e.movementY || 0) > 7) clearDragTimer();
    });
  }
  function clearDragTimer(){
    if(dragTimer){ clearTimeout(dragTimer); dragTimer = null; }
  }
  function startDrag(row, e){
    clearDragTimer();
    if(dragState) return;
    suppressNextClick = true;
    editingMessage = null;
    editPanel.classList.remove('show');
    if(document.activeElement) document.activeElement.blur();

    const rect = row.getBoundingClientRect();
    const placeholder = document.createElement('div');
    placeholder.className = 'drag-placeholder';
    placeholder.style.height = rect.height + 'px';
    row.parentNode.insertBefore(placeholder, row.nextSibling);

    dragState = { row, placeholder, offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top };
    row.classList.add('dragging');
    row.style.width = rect.width + 'px';
    row.style.left = rect.left + 'px';
    row.style.top = rect.top + 'px';
    row.style.margin = '0';
    row.setPointerCapture?.(e.pointerId);

    window.addEventListener('pointermove', onDragMove, {passive:false});
    window.addEventListener('pointerup', endDrag, {once:true});
    window.addEventListener('pointercancel', endDrag, {once:true});
    navigator.vibrate?.(18);
  }
  function onDragMove(e){
    if(!dragState) return;
    e.preventDefault();
    const {row, placeholder, offsetX, offsetY} = dragState;
    row.style.left = (e.clientX - offsetX) + 'px';
    row.style.top = (e.clientY - offsetY) + 'px';
    const chatRect = chat.getBoundingClientRect();
    if(e.clientY < chatRect.top + 70) chat.scrollTop -= 10;
    if(e.clientY > chatRect.bottom - 70) chat.scrollTop += 10;
    const rows = [...chat.querySelectorAll('.row:not(.dragging)')];
    let inserted = false;
    for(const target of rows){
      const r = target.getBoundingClientRect();
      if(e.clientY < r.top + r.height / 2){
        chat.insertBefore(placeholder, target);
        inserted = true;
        break;
      }
    }
    if(!inserted) chat.appendChild(placeholder);
  }
  function endDrag(){
    if(!dragState) return;
    const {row, placeholder} = dragState;
    window.removeEventListener('pointermove', onDragMove);
    row.classList.remove('dragging');
    row.style.width = '';
    row.style.left = '';
    row.style.top = '';
    row.style.margin = '';
    placeholder.parentNode.insertBefore(row, placeholder);
    placeholder.remove();
    dragState = null;
    rebuildDateSeparators();
    saveChat();
    setTimeout(() => { suppressNextClick = false; }, 120);
  }
  function openEditPanel(row){
    editingMessage = row;
    editTime.value = row.dataset.time || '';
    editPanel.classList.add('show');
  }
  function setMeta(row, value){
    row.dataset.time = value;
    const meta = row.querySelector('.meta');
    const who = row.dataset.who;
    if(who === 'me') meta.innerHTML = `<span class="read">既読</span>${value}`;
    else meta.textContent = value;
    saveChat();
  }

  document.getElementById('saveTime').onclick = () => {
    if(!editingMessage || !editTime.value) return;
    setMeta(editingMessage, editTime.value);
    editPanel.classList.remove('show');
  };
  document.getElementById('deleteMsg').onclick = () => {
    if(!editingMessage) return;
    editingMessage.remove();
    editingMessage = null;
    editPanel.classList.remove('show');
    rebuildDateSeparators();
    saveChat();
  };
  document.getElementById('closeEdit').onclick = () => {
    editingMessage = null;
    editPanel.classList.remove('show');
  };

  let lastSendAt = 0;
  function handleSendButton(e){
    if(e){ e.preventDefault(); e.stopPropagation(); }
    const now = Date.now();
    if(now - lastSendAt < 250) return;
    lastSendAt = now;
    sendMsg();
  }
  send.addEventListener('click', handleSendButton);
  send.addEventListener('pointerup', handleSendButton);
  send.addEventListener('touchend', handleSendButton, {passive:false});
  msg.addEventListener('keydown', e => { if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); }});
  msg.addEventListener('input', () => { msg.style.height='24px'; msg.style.height = Math.min(msg.scrollHeight,96)+'px'; updateComposerState(); });

  autoReplyToggle.onclick = () => {
    autoReplyBox.classList.toggle('show');
    autoReplyToggle.textContent = autoReplyBox.classList.contains('show') ? '自動返信設定を閉じる' : '自動返信設定を開く';
  };
  autoReplyEnabled.addEventListener('change', () => { resetNextReply(); saveSettings(); });
  replyWords.addEventListener('input', saveSettings);
  replyMin.addEventListener('input', () => { resetNextReply(); saveSettings(); });
  replyMax.addEventListener('input', () => { resetNextReply(); saveSettings(); });
  document.getElementById('settingsBtn').onclick = () => settings.classList.add('open');
  document.getElementById('closeSettings').onclick = () => settings.classList.remove('open');
  settings.addEventListener('click', e => { if(e.target === settings) settings.classList.remove('open'); });
  chat.addEventListener('click', () => { editingMessage = null; editPanel.classList.remove('show'); });
  document.getElementById('modeToggle').onclick = () => { modeLine.classList.toggle('show'); };
  expandTools.onclick = () => { modeLine.classList.toggle('show'); };
  asOther.onclick = () => { setSender('other'); modeLine.classList.remove('show'); };
  asMe.onclick = () => { setSender('me'); modeLine.classList.remove('show'); };
  nameInput.addEventListener('input', () => { displayName.textContent = nameInput.value || '相手の名前'; saveSettings(); saveChat(); });
  darkMode.addEventListener('change', () => { document.body.classList.toggle('dark', darkMode.checked); saveSettings(); });
  bgColor.addEventListener('input', () => { document.documentElement.style.setProperty('--bg', bgColor.value); saveSettings(); });
  avatarInput.addEventListener('change', e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = () => { avatarData = reader.result; localStorage.setItem(AVATAR_KEY, avatarData); setAvatar(avatarData); };
    reader.readAsDataURL(file);
  });
  document.getElementById('clearChat').onclick = () => {
    if(confirm('トークを全削除しますか？')){
      chat.innerHTML='';
      lastDateKey='';
      localStorage.removeItem(CHAT_KEY);
      resetNextReply();
    }
  };

  // トーク履歴を確実に保存するため、送信・編集・削除だけでなく、DOM変更も監視する
  let isLoadingChat = false;
  let saveTimer = null;
  const originalSaveChat = saveChat;
  saveChat = function(){
    if(isLoadingChat) return;
    try {
      originalSaveChat();
    } catch(e) {
      console.error('トーク保存に失敗しました', e);
    }
  };
  function queueSaveChat(){
    if(isLoadingChat) return;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveChat, 80);
  }
  const originalLoadChat = loadChat;
  loadChat = function(){
    isLoadingChat = true;
    try { originalLoadChat(); }
    finally {
      isLoadingChat = false;
      setTimeout(saveChat, 0);
    }
  };
  new MutationObserver(queueSaveChat).observe(chat, {
    childList:true, subtree:true, characterData:true, attributes:true, attributeFilter:['data-time','data-who','data-date-key']
  });

  setSender('me');
  updateComposerState();
  window.addEventListener('pageshow', () => { setSender('me'); loadChat(); });
  document.addEventListener('visibilitychange', () => { if(document.hidden){ saveSettings(); saveChat(); } else { setSender('me'); } });
  window.addEventListener('pagehide', () => { saveSettings(); saveChat(); });
  window.addEventListener('beforeunload', () => { saveSettings(); saveChat(); });

  loadChat();
})();
</script>
</body>
</html>
